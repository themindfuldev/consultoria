<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3a4150"/>
      <stop offset="1" stop-color="#2a2f3b"/>
    </linearGradient>
    <linearGradient id="bolt" x1="150" y1="70" x2="360" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffdf5b"/>
      <stop offset="0.55" stop-color="#f5c02e"/>
      <stop offset="1" stop-color="#e08f28"/>
    </linearGradient>
    <linearGradient id="gear" x1="120" y1="120" x2="392" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b93a3"/>
      <stop offset="1" stop-color="#5e677a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- App-icon background -->
  <rect x="0" y="0" width="512" height="512" rx="114" fill="url(#bg)"/>

  <!-- Gear / wheel -->
  <g stroke="url(#gear)" fill="none" stroke-linecap="round">
    <circle cx="256" cy="256" r="146" stroke-width="18"/>
    <circle cx="256" cy="256" r="120" stroke-width="9" opacity="0.6"/>
  </g>
  <g fill="url(#gear)">
    <rect x="239" y="110" width="34" height="104" rx="9"/>
    <rect x="239" y="298" width="34" height="104" rx="9"/>
    <rect x="110" y="239" width="104" height="34" rx="9"/>
    <rect x="298" y="239" width="104" height="34" rx="9"/>
    <circle cx="256" cy="256" r="46"/>
  </g>
  <circle cx="256" cy="256" r="26" fill="#2a2f3b"/>

  <!-- Lightning bolt -->
  <g filter="url(#shadow)">
    <path transform="translate(28,26) scale(19.1)"
      d="M13 2 3 14h9l-1 8 10-12h-9l1-8Z"
      fill="url(#bolt)"
      stroke="#c9781f" stroke-width="0.12"/>
  </g>
</svg>
